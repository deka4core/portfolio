<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>GitHub-активность — варианты</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Golos+Text:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="portfolio.css" />
<style>
  /* exploration-only styling for the GitHub activity variants */
  .gho-intro {
    display: flex; flex-direction: column; gap: 16px;
    padding: 44px 46px; height: 100%;
    background: var(--bg); color: var(--ink); font-family: var(--sans);
  }
  .gho-eyebrow { font-family: var(--mono); font-size: 12px; font-weight: 500; letter-spacing: .28em; color: var(--ink-faint); }
  .gho-name { margin: 0; font-weight: 700; letter-spacing: -.025em; font-size: 60px; line-height: .98; }
  .gho-sub { font-size: 16px; font-weight: 500; color: var(--ink-soft); margin-top: -4px; }
  .gho-bio { font-size: 15px; line-height: 1.6; color: var(--ink-soft); max-width: 34ch; margin: 0; text-wrap: pretty; }
  .gho-chips { display: flex; flex-wrap: wrap; gap: 8px; }
  .gho-chip { font-family: var(--mono); font-size: 12px; color: var(--ink-soft); background: var(--chip-bg); border: 1px solid var(--line-hair-2); padding: 6px 11px; border-radius: 999px; }
  .gho-actions { display: flex; flex-wrap: wrap; gap: 11px; }
  .gho-btn { display: inline-flex; align-items: center; gap: 8px; text-decoration: none; font-family: var(--sans); font-size: 14px; font-weight: 600; padding: 11px 20px; border-radius: 11px; }
  .gho-btn.p { background: var(--ink); color: var(--bg); }
  .gho-btn.g { background: transparent; color: var(--ink); border: 1px solid var(--line-hair); }
  .gho-spacer { height: 14px; flex: none; }

  /* ---- shared: a subtle divider that separates activity from the bio block ---- */
  .gho-gh { display: flex; flex-direction: column; gap: 12px; }
  .gho-gh-label { font-family: var(--mono); font-size: 10.5px; font-weight: 500; letter-spacing: .16em; text-transform: uppercase; color: var(--ink-faint); display: flex; align-items: center; gap: 8px; }
  .gho-live { width: 7px; height: 7px; border-radius: 50%; background: var(--gh-accent); position: relative; }
  .gho-live::after { content: ""; position: absolute; inset: -4px; border-radius: 50%; border: 1.5px solid var(--gh-accent); animation: gholive 2.4s ease-out infinite; }
  @keyframes gholive { 0% { transform: scale(.6); opacity: .7; } 70% { opacity: 0; } 100% { transform: scale(2); opacity: 0; } }

  /* ===== Variant A — contribution strip ===== */
  .ghoA-grid { display: grid; grid-auto-flow: column; grid-template-rows: repeat(7, 11px); grid-auto-columns: 11px; gap: 3px; }
  .ghoA-cell { border-radius: 2.5px; background: var(--chip-bg); }
  .ghoA-foot { display: flex; align-items: center; gap: 10px; font-family: var(--mono); font-size: 11.5px; color: var(--ink-faint); }
  .ghoA-foot b { color: var(--ink); font-weight: 600; }
  .ghoA-dot { width: 3px; height: 3px; border-radius: 50%; background: var(--ink-faint); opacity: .5; }

  /* ===== Variant B — status caption ===== */
  .ghoB { display: flex; flex-direction: column; gap: 5px; }
  .ghoB-line { font-family: var(--mono); font-size: 12.5px; color: var(--ink-soft); display: flex; align-items: center; gap: 9px; }
  .ghoB-line .repo { color: var(--gh-accent); font-weight: 500; }
  .ghoB-line .sep { color: var(--ink-faint); }
  .ghoB-stats { font-family: var(--mono); font-size: 11.5px; color: var(--ink-faint); }
  .ghoB-stats b { color: var(--ink); font-weight: 600; }

  /* ===== Variant C — typographic commit list ===== */
  .ghoC { display: flex; flex-direction: column; }
  .ghoC-row { display: grid; grid-template-columns: minmax(0,1fr) auto; align-items: baseline; gap: 12px; padding: 9px 0; border-top: 1px solid var(--line-hair-2); }
  .ghoC-row:first-of-type { border-top: 0; }
  .ghoC-main { min-width: 0; display: flex; align-items: baseline; gap: 9px; }
  .ghoC-repo { font-family: var(--mono); font-size: 12px; font-weight: 500; color: var(--gh-accent); flex: none; }
  .ghoC-msg { font-size: 13px; color: var(--ink-soft); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .ghoC-ago { font-family: var(--mono); font-size: 11px; color: var(--ink-faint); flex: none; }
  .ghoC-foot { margin-top: 11px; padding-top: 11px; border-top: 1px solid var(--line-hair); font-family: var(--mono); font-size: 11.5px; color: var(--ink-faint); display: flex; gap: 10px; align-items: center; }
  .ghoC-foot b { color: var(--ink); font-weight: 600; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="design-canvas.jsx"></script>

<script type="text/babel">
const ACCENT = "#8d76b5"; // muted purple — the "Algorithms" line color

function TgIcon() {
  return (
    <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true">
      <path fill="currentColor" d="M21.94 4.3 18.6 19.06c-.25 1.1-.92 1.37-1.86.85l-5.14-3.79-2.48 2.39c-.27.27-.5.5-1.03.5l.37-5.2 9.5-8.58c.41-.37-.09-.57-.64-.2L5.02 12.4l-5.06-1.58c-1.1-.34-1.12-1.1.23-1.63L20.5 2.6c.92-.34 1.72.2 1.44 1.7z" transform="translate(1 0)" />
    </svg>);
}

// shared top of the left column (legend removed)
function IntroTop() {
  return (
    <React.Fragment>
      <div className="gho-eyebrow">TIMOFEY ZALEVSKY</div>
      <h1 className="gho-name">Тимофей<br/>Залевский</h1>
      <div className="gho-sub">Фундаментальная информатика и ИТ · Кубанский государственный университет</div>
      <p className="gho-bio">Студент 3-го курса. Строю системы снизу вверх — от указателей в C++ до планов запросов в PostgreSQL, с особой любовью к чистым алгоритмам.</p>
      <div className="gho-chips">
        {["Python","C++","SQL","JS","Linux","Django","Redis"].map(c => <span className="gho-chip" key={c}>{c}</span>)}
      </div>
      <div className="gho-actions">
        <a className="gho-btn p"><span style={{fontSize:15}}>↗</span> GitHub</a>
        <a className="gho-btn g"><TgIcon/> Telegram</a>
        <a className="gho-btn g">Резюме</a>
      </div>
    </React.Fragment>);
}

const COMMITS = [
  { repo: "graph-suite", msg: "Биномиальная куча в Дейкстре", ago: "2 ч" },
  { repo: "pg-replica",  msg: "Переподключение WAL-стрима",   ago: "вчера" },
  { repo: "redis-cache", msg: "Гонка при TTL-вытеснении",     ago: "3 дн" },
];

// ---- Variant A: contribution strip ----
function VariantA() {
  const weeks = 18, days = 7;
  let seed = 9;
  const rnd = () => { seed = (seed * 1103515245 + 12345) & 0x7fffffff; return seed / 0x7fffffff; };
  const cells = [];
  for (let i = 0; i < weeks * days; i++) {
    const r = rnd();
    const lvl = r < 0.46 ? 0 : r < 0.66 ? 1 : r < 0.83 ? 2 : r < 0.94 ? 3 : 4;
    cells.push(lvl);
  }
  const op = [0, 0.28, 0.5, 0.74, 1];
  return (
    <div className="gho-intro" style={{ "--gh-accent": ACCENT }}>
      <IntroTop />
      <div className="gho-spacer" />
      <div className="gho-gh">
        <div className="gho-gh-label"><span className="gho-live" /> активность · github</div>
        <div className="ghoA-grid">
          {cells.map((lvl, i) =>
            <span className="ghoA-cell" key={i}
              style={lvl ? { background: ACCENT, opacity: op[lvl] } : undefined} />
          )}
        </div>
        <div className="ghoA-foot">
          <span><b>24</b> репо</span><span className="ghoA-dot" />
          <span><b>183</b> звёзд</span><span className="ghoA-dot" />
          <span>push 2 ч назад</span>
        </div>
      </div>
    </div>);
}

// ---- Variant B: status caption ----
function VariantB() {
  return (
    <div className="gho-intro" style={{ "--gh-accent": ACCENT }}>
      <IntroTop />
      <div className="gho-spacer" />
      <div className="ghoB">
        <div className="ghoB-line">
          <span className="gho-live" />
          push в <span className="repo">graph-suite</span> <span className="sep">·</span> 2 ч назад
        </div>
        <div className="ghoB-stats"><b>24</b> репозитория · <b>183</b> звезды на github.com/deka4core</div>
      </div>
    </div>);
}

// ---- Variant C: typographic commit list ----
function VariantC() {
  return (
    <div className="gho-intro" style={{ "--gh-accent": ACCENT }}>
      <IntroTop />
      <div className="gho-spacer" />
      <div className="gho-gh">
        <div className="gho-gh-label"><span className="gho-live" /> последние коммиты</div>
        <div className="ghoC">
          {COMMITS.map((c, i) =>
            <div className="ghoC-row" key={i}>
              <div className="ghoC-main">
                <span className="ghoC-repo">{c.repo}</span>
                <span className="ghoC-msg">{c.msg}</span>
              </div>
              <span className="ghoC-ago">{c.ago}</span>
            </div>
          )}
          <div className="ghoC-foot"><span><b>24</b> репо</span><span style={{opacity:.4}}>/</span><span><b>183</b> звёзд</span></div>
        </div>
      </div>
    </div>);
}

const { DesignCanvas, DCSection, DCArtboard } = window;
const W = 560, H = 660;

ReactDOM.createRoot(document.getElementById("root")).render(
  <DesignCanvas>
    <DCSection id="gh" title="GitHub-активность" subtitle="Легенда убрана · акцент — фиолетовая линия «Алгоритмы»">
      <DCArtboard id="a" label="A · Контрибьюшн-полоса" width={W} height={H}><VariantA /></DCArtboard>
      <DCArtboard id="b" label="B · Строка-статус" width={W} height={H}><VariantB /></DCArtboard>
      <DCArtboard id="c" label="C · Лента коммитов" width={W} height={H}><VariantC /></DCArtboard>
    </DCSection>
  </DesignCanvas>
);
</script>

<template id="__bundler_thumbnail">
<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
<rect width="100" height="100" fill="#fbfbfc"/>
<rect x="22" y="40" width="9" height="9" rx="2" fill="#8d76b5" opacity="0.4"/>
<rect x="34" y="40" width="9" height="9" rx="2" fill="#8d76b5"/>
<rect x="46" y="40" width="9" height="9" rx="2" fill="#8d76b5" opacity="0.6"/>
<rect x="58" y="40" width="9" height="9" rx="2" fill="#8d76b5" opacity="0.3"/>
<rect x="70" y="40" width="9" height="9" rx="2" fill="#8d76b5" opacity="0.8"/>
</svg>
</template>
</body>
</html>
